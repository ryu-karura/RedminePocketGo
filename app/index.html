<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>RedminePocketGo</title>
  <!-- FOUC 防止。唯一許可されるインラインスクリプト（CLAUDE.md §3.4） -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/vendor/tabulator.min.css">
  <link rel="stylesheet" href="css/components/states.css">
  <link rel="stylesheet" href="css/screens/login.css">
  <link rel="stylesheet" href="css/screens/projects.css">
  <link rel="stylesheet" href="css/screens/issues.css">
  <link rel="stylesheet" href="css/screens/issue-detail.css">
</head>
<body>
  <header class="topbar">
    <button class="topbar__btn menu" id="menuBtn" aria-label="メニューを開く" aria-expanded="false">☰</button>
    <span class="topbar__title" id="topbarTitle">RedminePocketGo</span>
    <button class="topbar__btn" id="themeBtn" aria-label="テーマ切替">◐</button>
  </header>

  <div class="app-body">
    <nav class="drawer" id="drawer" aria-label="画面ナビゲーション"></nav>
    <div class="drawer__backdrop" id="drawerBackdrop"></div>
    <main id="screens" tabindex="-1"></main>
  </div>

  <div id="toasts" aria-live="polite" aria-atomic="false"></div>

  <!-- 未認証時の全面ログインオーバーレイ -->
  <div id="loginOverlay" role="dialog" aria-modal="true" aria-label="ログイン"></div>

  <!-- Tabulator（UMD、vendor 同梱。window.Tabulator を提供） -->
  <script src="js/vendor/tabulator.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
